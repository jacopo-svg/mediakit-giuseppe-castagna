document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

{\n  /* === COLORI === */\n  --color-bg-dark: #001845;\n  --color-bg-light: #fff8ec;\n  --color-bg-mid: #f3f6f6;\n  --color-accent: #206de5;\n  --color-accent-soft: #bfdbf7;\n  --color-text-on-dark: rgba(255,248,236,1);\n  --color-text-on-dark-muted: rgba(255,248,236,0.6);\n  --color-text-primary: #001845;\n  --color-text-muted: rgba(0,24,69,0.6);\n  --color-card: #ffffff;\n  --color-hairline: rgba(0,24,69,0.09);\n  --color-hairline-dark: rgba(255,248,236,0.12);\n\n  /* === FONT === */\n  --font-body: 'Hanken Grotesk', system-ui, sans-serif;\n  --font-mono: 'Schibsted Grotesk', 'Hanken Grotesk', system-ui, sans-serif;\n\n  /* === SPAZIATURE === */\n  --section-padding-v: clamp(72px, 9vw, 124px);\n  --section-padding-h: clamp(18px, 5vw, 64px);\n  --max-width: 1180px;\n\n  /* === BORDER RADIUS === */\n  --radius-pill: 999px;\n  --radius-card: 24px;\n  --radius-card-sm: 18px;\n\n  /* === ANIMAZIONI === */\n  --transition-fast: 0.2s ease;\n  --transition-medium: 0.32s cubic-bezier(.2,.7,.2,1);\n  --transition-expand: 0.35s cubic-bezier(.2,.7,.2,1);\n}\n* { box-sizing: border-box; }\nhtml { scroll-behavior: smooth; }\nbody { margin: 0; background: var(--color-bg-mid); color: var(--color-text-primary); font-family: var(--font-body); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }\n::selection { background: var(--color-accent); color: var(--color-bg-light); }\na { color: inherit; text-decoration: none; }\n\n/* reveal-on-scroll (attivo solo con JS; senza JS tutto resta visibile) */\n#gc-mediakit.gc-js [data-rv] { opacity: 0; transform: translateY(24px); transition: opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1); }\n#gc-mediakit.gc-js [data-rv].gc-in { opacity: 1; transform: none; }\n\n/* logo orso */\n.bear-breathe { display: inline-flex; transform-origin: center; }\n.bear-img { transition: transform .3s cubic-bezier(.34,1.56,.64,1); cursor: pointer; }\n.bear-img:hover { transform: scale(1.12); }\n@media (prefers-reduced-motion: no-preference) {\n  .bear-breathe { animation: bearBreathe 3s ease-in-out infinite; }\n}\n@keyframes bearBreathe { 0%,100% { transform: scale(1) rotate(-2deg); } 50% { transform: scale(1.04) rotate(2deg); } }\n@keyframes bearShake { 0%,100% { transform: translateX(0); } 10%,30%,50%,70%,90% { transform: translateX(-8px); } 20%,40%,60%,80% { transform: translateX(8px); } }\n@keyframes bearBounce { 0% { transform: scale(1); } 30% { transform: scale(1.14); } 50% { transform: scale(.94); } 70% { transform: scale(1.05); } 100% { transform: scale(1); } }\n\n/* particelle */\n.gc-particle { position: absolute; border-radius: 50%; background: var(--color-accent); pointer-events: none; will-change: transform; }\n@keyframes gcDrift { 0% { transform: translate(0,0); } 50% { transform: translate(var(--dx), var(--dy)); } 100% { transform: translate(0,0); } }\n@media (prefers-reduced-motion: reduce) { .gc-particle { display: none; } }\n\n/* card video con lightbox */\n.vcard { position: relative; border-radius: var(--radius-card-sm); overflow: hidden; cursor: pointer; background-size: cover; background-position: center; min-height: 208px; display: flex; flex-direction: column; justify-content: space-between; }\n.vcard-overlay { position: absolute; inset: 0; background: rgba(0,12,34,.4); transition: background var(--transition-medium); }\n.vcard:hover .vcard-overlay { background: rgba(0,12,34,.2); }\n.vcard-play { position: absolute; inset: 0; margin: auto; width: 62px; height: 62px; z-index: 3; opacity: 0; transform: scale(.8); transition: opacity var(--transition-medium), transform var(--transition-medium); }\n.vcard:hover .vcard-play { opacity: 1; transform: scale(1); }\n\n/* formati: hover-expand */\n#gc-mediakit [data-fmt] { align-self: start; }\n.fmt-letter { transition: background var(--transition-medium), color var(--transition-medium), border-color var(--transition-medium); }\n[data-fmt]:hover .fmt-letter { background: var(--color-accent); color: var(--color-bg-light); border-color: var(--color-accent); }\n.fmt-detail { max-height: 0; opacity: 0; overflow: hidden; transition: max-height var(--transition-expand), opacity var(--transition-expand), margin-top var(--transition-expand); }\n[data-fmt]:hover .fmt-detail { max-height: 560px; opacity: 1; margin-top: 14px; }\n\n/* CTA secondaria */\n.cta-sec { display: inline-block; border: 1.6px solid var(--color-accent); color: var(--color-accent); font-family: var(--font-body); font-weight: 700; font-size: 13px; padding: 10px 18px; border-radius: var(--radius-pill); transition: transform var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast), color var(--transition-fast); }\n.cta-sec:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(32,109,229,.32); background: var(--color-accent); color: var(--color-bg-light); }\n\n/* hue shift impercettibile su sezioni chiare quando il mouse è fermo */\n.gc-light-shift { transition: filter 2.4s ease; }\n.gc-light-shift.gc-idle { filter: hue-rotate(6deg) saturate(1.03); }\n\n/* personas: hover-expand hero card */\n#gc-mediakit [data-persona] h3 { color: var(--color-text-primary); transition: color .3s; }\n#gc-mediakit [data-persona] .persona-num { color: var(--color-accent); transition: color .3s; }\n#gc-mediakit [data-persona] .persona-detail { max-height: 0; opacity: 0; overflow: hidden; color: var(--color-text-muted); transition: max-height .42s cubic-bezier(.2,.7,.2,1), opacity .3s, margin-top .42s; }\n#gc-mediakit [data-persona]:hover { transform: translateY(-6px) scale(1.03); z-index: 6; background: var(--color-accent) !important; border-color: var(--color-accent) !important; box-shadow: 0 26px 58px rgba(0,24,69,.22); }\n#gc-mediakit [data-persona]:hover h3, #gc-mediakit [data-persona]:hover .persona-num { color: var(--color-bg-light); }\n#gc-mediakit [data-persona]:hover .persona-detail { max-height: 300px; opacity: 1; margin-top: 12px; color: rgba(255,248,236,.92); }\n\n@media (max-width: 840px) { #gc-mediakit [data-desktopnav] { display: none !important; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div id=\"gc-mediakit\" style=\"overflow-x:hidden;\">\n\n  <header style=\"position:fixed;top:0;left:0;right:0;z-index:100;height:66px;display:flex;align-items:center;backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);background:rgba(243,246,246,.82);border-bottom:1px solid var(--color-hairline);\">\n    <div style=\"width:100%;max-width:var(--max-width);margin:0 auto;padding:0 var(--section-padding-h);display:flex;align-items:center;justify-content:space-between;gap:24px;\">\n      <a href=\"#profilo\" style=\"display:flex;align-items:center;gap:11px;\">\n        <img class=\"bear-img\" src=\"eebf862c-3d95-4da6-96f3-30fe53403b6e\" alt=\"Brown Media\" style=\"height:30px;width:auto;display:block;\">\n        <span style=\"display:flex;flex-direction:column;line-height:1;\">\n          <span style=\"font-weight:800;font-size:15px;letter-spacing:.01em;\">GIUSEPPE CASTAGNA<\u002Fspan>\n          <span style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;color:rgba(0,24,69,.5);margin-top:3px;\">BROWN&nbsp;MEDIA<\u002Fspan>\n        <\u002Fspan>\n      <\u002Fa>\n      <nav data-desktopnav=\"\" style=\"display:flex;align-items:center;gap:30px;\">\n        <sc-for list=\"{{ nav }}\" as=\"n\" hint-placeholder-count=\"5\">\n          <a href=\"{{ n.href }}\" data-nav-link=\"{{ n.id }}\" style=\"font-size:14px;font-weight:600;color:rgba(0,24,69,.55);transition:color .25s;\">{{ n.label }}<\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fnav>\n      <a href=\"#contatti\" style=\"flex:none;background:var(--color-accent);color:var(--color-bg-light);font-weight:700;font-size:14px;padding:11px 20px;border-radius:var(--radius-pill);transition:transform .2s,box-shadow .2s;\" style-hover=\"transform:translateY(-1px);box-shadow:0 8px 22px rgba(32,109,229,.35);\">Contattami<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ HERO / PROFILO ============ -->\n  <section id=\"profilo\" data-screen-label=\"Hero / Profilo\" style=\"background:var(--color-bg-dark);color:var(--color-text-on-dark);padding:clamp(116px,15vw,168px) var(--section-padding-h) clamp(56px,7vw,88px);scroll-margin-top:80px;position:relative;overflow:hidden;\">\n    <div data-particles=\"\" aria-hidden=\"true\" style=\"position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden;\"><\u002Fdiv>\n    <div style=\"max-width:var(--max-width);margin:0 auto;position:relative;z-index:2;\">\n      <div style=\"display:flex;flex-wrap:wrap;gap:clamp(32px,5vw,64px);align-items:center;\">\n        <div style=\"flex:1 1 440px;min-width:0;\">\n          <span data-rv=\"\" style=\"display:inline-flex;align-items:center;gap:9px;border:1.6px solid rgba(255,248,236,.34);border-radius:var(--radius-pill);padding:8px 16px;font-family:var(--font-mono);font-size:12px;letter-spacing:.16em;color:var(--color-text-on-dark);\">MEDIA&nbsp;KIT&nbsp;·&nbsp;2026<\u002Fspan>\n          <h1 data-rv=\"\" style=\"font-size:clamp(44px,8vw,88px);font-weight:800;line-height:.96;letter-spacing:-.025em;margin:26px 0 0;\">Giuseppe<br>Castagna<\u002Fh1>\n          <p data-rv=\"\" style=\"font-size:clamp(16px,1.7vw,20px);font-weight:600;color:var(--color-accent);margin:20px 0 0;letter-spacing:.005em;\">YouTube Creator · AI, Produttività &amp; Finanza Personale<\u002Fp>\n          <p data-rv=\"\" style=\"font-size:clamp(16px,1.55vw,19px);line-height:1.62;color:var(--color-text-on-dark-muted);max-width:600px;margin:22px 0 0;\">Avvocato d'affari diventato creator. Giuseppe parla di AI, produttività e finanza a un pubblico di professionisti italiani che non guarda YouTube per passare il tempo ma per prendere decisioni migliori.<\u002Fp>\n          <div data-rv=\"\" style=\"display:flex;flex-wrap:wrap;gap:14px;margin-top:34px;\">\n            <a href=\"#formati\" style=\"background:var(--color-accent);color:var(--color-bg-light);font-we em;margin:0;\">{{ f.t }}<\u002Fh3>\n            <p style=\"font-size:14.5px;line-height:1.58;color:var(--color-text-muted);margin:0;\">{{ f.d }}<\u002Fp>\n            <div class=\"fmt-detail\">\n              <div style=\"border-top:1px dashed rgba(0,24,69,.2);padding-top:14px;\">\n                <p style=\"font-size:13.5px;line-height:1.62;color:var(--color-text-muted);margin:0 0 16px;\">{{ f.long }}<\u002Fp>\n                <a class=\"cta-sec\" href=\"{{ f.mailto }}\">Richiedi info →<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ BRAND ============ -->\n  <section id=\"brand\" class=\"gc-light-shift\" data-screen-label=\"Brand\" style=\"background:var(--color-bg-mid);padding:var(--section-padding-v) var(--section-padding-h);scroll-margin-top:70px;\">\n    <div style=\"max-width:var(--max-width);margin:0 auto;\">\n      <span data-rv=\"\" style=\"display:inline-block;border:1.6px solid var(--color-text-primary);border-radius:var(--radius-pill);padding:8px 16px;font-family:var(--font-mono);font-size:12px;letter-spacing:.15em;\">HANNO&nbsp;GIÀ&nbsp;SCELTO&nbsp;IL&nbsp;CANALE<\u002Fspan>\n      <h2 data-rv=\"\" style=\"font-size:clamp(30px,4.6vw,54px);font-weight:800;line-height:1.04;letter-spacing:-.025em;max-width:780px;margin:24px 0 0;\">Brand che si sono posizionati<br>con Giuseppe.<\u002Fh2>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-top:clamp(36px,5vw,52px);\">\n        <sc-for list=\"{{ brands }}\" as=\"b\" hint-placeholder-count=\"6\">\n          <div data-rv=\"\" style=\"background:{{ b.bg }};border:{{ b.border }};border-radius:var(--radius-card-sm);height:104px;display:flex;align-items:center;justify-content:center;text-align:center;padding:16px;transition:transform .28s cubic-bezier(.2,.7,.2,1),box-shadow .28s;\" style-hover=\"transform:translateY(-5px);box-shadow:0 16px 36px rgba(0,24,69,.1);\">\n            <sc-if value=\"{{ b.logo }}\" hint-placeholder-val=\"{{ false }}\">\n              <div role=\"img\" aria-label=\"{{ b.name }}\" data-brand-logo=\"\" style=\"width:76%;height:44px;background-image:url('{{ b.logo }}');background-size:contain;background-position:center;background-repeat:no-repeat;\"><\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ b.text }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"font-size:{{ b.size }};font-weight:{{ b.weight }};letter-spacing:-.01em;color:{{ b.color }};\">{{ b.name }}<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CONTATTI ============ -->\n  <section id=\"contatti\" data-screen-label=\"Contatti\" style=\"background:var(--color-bg-dark);color:var(--color-text-on-dark);padding:clamp(76px,10vw,128px) var(--section-padding-h) clamp(48px,6vw,72px);scroll-margin-top:70px;\">\n    <div style=\"max-width:var(--max-width);margin:0 auto;\">\n      <div style=\"display:flex;flex-wrap:wrap;gap:clamp(32px,5vw,56px);align-items:center;justify-content:space-between;\">\n        <div style=\"flex:1 1 440px;min-width:0;\">\n          <span data-rv=\"\" style=\"display:inline-block;border:1.6px solid rgba(255,248,236,.34);border-radius:var(--radius-pill);padding:8px 16px;font-family:var(--font-mono);font-size:12px;letter-spacing:.15em;\">PARLIAMONE<\u002Fspan>\n          <h2 data-rv=\"\" style=\"font-size:clamp(30px,4.8vw,56px);font-weight:800;line-height:1.03;letter-spacing:-.025em;margin:24px 0 0;max-width:640px;\">Parliamo della prossima collaborazione.<\u002Fh2>\n          <div data-rv=\"\" style=\"display:flex;flex-wrap:wrap;gap:14px;margin-top:34px;\">\n            <a href=\"mailto:Info@giuseppecastagna.it\" style=\"background:var(--color-accent);color:var(--color-bg-light);font-weight:700;font-size:15px;padding:15px 28px;border-radius:var(--radius-pill);transition:transform .2s,box-shadow .2s;\" style-hover=\"transform:translateY(-2px);box-shadow:0 12px 30px rgba(32,109,229,.4);\">Info@giuseppecastagna.it<\u002Fa>\n            <a href=\"https://youtube.com/@GiuseppeCastagna\" target=\"_blank\" rel=\"noopener\" style=\"border:1.6px solid rgba(255,248,236,.32);color:var(--color-text-on-dark);font-weight:700;font-size:15px;padding:15px 28px;border-radius:var(--radius-pill);transition:background .2s,border-color .2s;\" style-hover=\"background:rgba(255,248,236,.08);border-color:rgba(255,248,236,.6);\">youtube.com/@GiuseppeCastagna<\u002Fa>\n          <\u002Fdiv>\n          <p data-rv=\"\" style=\"font-family:var(--font-mono);font-size:13px;color:rgba(255,248,236,.55);margin:26px 0 0;line-height:1.6;\">Rispondo entro 48 ore · Tutte le collaborazioni sono valutate singolarmente.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"flex:0 1 220px;display:flex;justify-content:center;\">\n          <img class=\"bear-img\" data-bear-contact=\"\" src=\"40b11c18-96cd-410a-95ce-6f1958bfe957\" alt=\"Logo Brown Media\" style=\"width:min(190px,46vw);height:auto;opacity:.92;\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:1px solid var(--color-hairline-dark);margin-top:clamp(48px,6vw,72px);padding-top:24px;display:flex;flex-wrap:wrap;gap:12px;justify-content:space-between;align-items:center;\">\n        <span style=\"display:flex;align-items:center;gap:10px;font-weight:800;font-size:14px;letter-spacing:.01em;\"><img class=\"bear-img\" src=\"40b11c18-96cd-410a-95ce-6f1958bfe957\" alt=\"\" style=\"height:22px;width:auto;\">GIUSEPPE CASTAGNA<\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap;\">\n          <span data-sheet-badge=\"\" style=\"display:inline-flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:10.5px;color:rgba(255,248,236,.5);letter-spacing:.04em;border:1px solid var(--color-hairline-dark);border-radius:var(--radius-pill);padding:5px 12px;\">\n            <span data-sheet-dot=\"\" style=\"width:6px;height:6px;border-radius:50%;background:rgba(255,248,236,.35);transition:background .4s;\"><\u002Fspan>\n            Dati aggiornati al: <span data-bind=\"sheetUpdated\">{{ sheetUpdated }}<\u002Fspan>\n          <\u002Fspan>\n          <span style=\"font-family:var(--font-mono);font-size:11px;color:rgba(255,248,236,.45);letter-spacing:.06em;\">© 2026 BROWN MEDIA · MEDIA KIT<\u002Fspan>\n        <\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ LIGHTBOX VIDEO ============ -->\n  <div data-lightbox=\"\" style=\"display:none;opacity:0;transition:opacity .25s ease;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.82);align-items:center;justify-content:center;padding:clamp(16px,4vw,56px);\">\n    <div style=\"position:relative;width:100%;max-width:1000px;\">\n      <button data-lb-close=\"\" aria-label=\"Chiudi\" style=\"position:absolute;top:-46px;right:0;background:none;border:none;color:var(--color-bg-light);font-size:32px;line-height:1;cursor:pointer;font-family:var(--font-body);\">×<\u002Fbutton>\n      <div style=\"position:relative;width:100%;aspect-ratio:16/9;border-radius:14px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.5);background:#000;\">\n        <iframe data-lb-frame=\"\" src=\"\" title=\"Video YouTube\" allow=\"autoplay; encrypted-media; picture-in-picture\" allowfullscreen=\"\" style=\"position:absolute;inset:0;width:100%;height:100%;border:0;\"><\u002Fiframe>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;},&quot;showTopContent&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;animateReveal&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#206de5&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  // URL del Google Sheet pubblico in formato CSV (colonna A = chiave, colonna B = valore)\n  static SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCTqKfch-00YQubiQrembBbjphN9W98XgIvL8TRlCOFhvCJB95b3dcVVYJ2yNV08x_pPG2NP-r3fSc/pub?gid=0&single=true&output=csv';\n\n  state = { sheet: null };\n\n  fmt(n, dec) {\n    return Number(n).toLocaleString('it-IT', { minimumFractionDigits: dec, maximumFractionDigits: dec, useGrouping: 'always' });\n  }\n\n  // --- Lettura dati dal Google Sheet (con fallback silenzioso ai valori hardcoded) ---\n  async loadSheetData() {\n    try {\n      const res = await fetch(Component.SHEET_CSV_URL, { cache: 'no-store' });\n      if (!res.ok) return;                       // fallback silenzioso\n      const text = await res.text();\n      const rows = this.parseCSV(text);\n      const data = {};\n      rows.forEach(r => { if (r.length >= 2 && r[0]) data[String(r[0]).trim()] = (r[1] == null ? '' : String(r[1])).trim(); });\n      if (Object.keys(data).length) this.setState({ sheet: data });  // re-render -> renderVals applica i nuovi valori\n    } catch (e) {\n      /* fetch fallito / offline / CORS: si usano silenziosamente i valori hardcoded */\n    }\n  }\n\n  // CSV parser minimale che rispetta i campi tra virgolette (i valori possono contenere la virgola decimale)\n  parseCSV(text) {\n    const rows = [];\n    let row = [], field = '', inQ = false;\n    for (let i = 0; i < text.length; i++) {\n      const ch = text[i];\n      if (inQ) {\n        if (ch === '\"') { if (text[i + 1] === '\"') { field += '\"'; i++; } else inQ = false; }\n        else field += ch;\n      } else if (ch === '\"') inQ = true;\n      else if (ch === ',') { row.push(field); field = ''; }\n      else if (ch === '\\n' || ch === '\\r') {\n        if (ch === '\\r' && text[i + 1] === '\\n') i++;\n        row.push(field); field = '';\n        if (row.some(c => c !== '')) rows.push(row);\n        row = [];\n      } else field += ch;\n    }\n    if (field !== '' || row.length) { row.push(field); if (row.some(c => c !== '')) rows.push(row); }\n    return rows;\n  }\n\n  // \"1,22M\" -> {num:1.22, dec:2, suffix:'M', display:'1,22M'} ; \"9.973\" -> {num:9973, dec:0, suffix:''}\n  parseMetric(str, def) {\n    const raw = (str == null || String(str).trim() === '') ? def : String(str);\n    const s = String(raw).trim();\n    const m = s.match(/^([\\d.,\\s]+)\\s*(.*)$/);\n    const numPart = m ? m[1].trim() : s;\n    const suffix = m ? m[2].trim() : '';\n    const normalized = numPart.replace(/\\s/g, '').replace(/\\./g, '').replace(/,/g, '.');\n    let num = parseFloat(normalized); if (isNaN(num)) num = 0;\n    let dec = 0; const ci = numPart.indexOf(','); if (ci >= 0) dec = numPart.length - ci - 1;\n    return { num, dec, suffix, display: s };\n  }\n\n  // estrae solo il valore numerico (per barre e percentuali): \"41%\" -> 41\n  parseNum(str, def) {\n    if (str == null || String(str).trim() === '') return def;\n    const n = parseFloat(String(str).replace(/[^\\d.,-]/g, '').replace(/\\./g, '').replace(/,/g, '.'));\n    return isNaN(n) ? def : n;\n  }\n\n  // risolve la magnitudine reale: \"1220000\" -> 1220000 ; \"1,22M\" -> 1220000 ; \"9.973\" -> 9973\n  toNumber(str, def) {\n    if (str == null || String(str).trim() === '') return def;\n    const p = this.parseMetric(str, '0');\n    let n = p.num; const s = (p.suffix || '').toLowerCase();\n    if (s.indexOf('m') >= 0) n *= 1e6;\n    else if (s.indexOf('k') >= 0 || s.indexOf('mila') >= 0) n *= 1e3;\n    return isNaN(n) ? def : n;\n  }\n\n  // formatta un numero grezzo in {display, c, dec, suffix} secondo la modalita' della metrica\n  // mode 'M' -> \"1,22M\" (milioni) ; mode 'int' -> \"56.783\" con eventuale suffisso (h, +, ...)\n  formatMetric(value, mode, suffix) {\n    suffix = suffix || '';\n    if (mode === 'M') {\n      const m = value / 1e6;\n      return { display: this.fmt(m, 2) + 'M', c: String(m), dec: '2', suffix: 'M' };\n    }\n    return { display: this.fmt(value, 0) + suffix, c: String(value), dec: '0', suffix };\n  }\n\n  applyGenderArc() {\n    const root = document.getElementById('gc-mediakit');\n    const arc = root && root.querySelector('[data-gender-arc]');\n    if (!arc) return;\n    const men = this.parseNum((this.state.sheet || {}).genere_uomini, 78);\n    const circ = 2 * Math.PI * 80;\n    arc.setAttribute('stroke-dasharray', (circ * Math.max(0, Math.min(100, men)) / 100).toFixed(2) + ' ' + circ.toFixed(2));\n  }\n\n  componentDidUpdate() {\n    // i grafici audience restano a 0 finché la sezione non entra nel viewport;\n    // dopo un re-render (es. dati dal Google Sheet) ri-applichiamo lo stato corrente\n    const sec = document.getElementById('audience');\n    if (sec) {\n      if (this._audShown) {\n        sec.querySelectorAll('[data-grow]').forEach(b => { const v = b.getAttribute('data-val') || '0%'; if (b.getAttribute('data-grow') === 'h') b.style.height = v; else b.style.width = v; });\n        this.applyGenderArc();\n      } else if (this._audSetZero) {\n        this._audSetZero();\n      }\n    }\n    this.setupBrandLogos();\n    // i contatori della stat band: mantengono lo stato corrente dopo un re-render\n    if (this._statShown) { if (this._statSetFull) this._statSetFull(); }\n    else if (this._statSetZero) { this._statSetZero(); }\n    // segnala visivamente l'avvenuto aggiornamento dai dati live\n    const dot = document.querySelector('[data-sheet-dot]');\n    if (dot && this.state.sheet) dot.style.background = 'var(--color-accent)';\n  }\n\n  componentDidMount() {\n    const root = document.getElementById('gc-mediakit');\n    if (!root) return;\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n    // accent override -> basta cambiare la variabile CSS\n    if (this.props.accent && this.props.accent.toLowerCase() !== '#206de5') {\n      root.style.setProperty('--color-accent', this.props.accent);\n    }\n    const accent = (getComputedStyle(root).getPropertyValue('--color-accent').trim()) || '#206de5';\n\n    this.buildParticles(root, reduce);\n    if (this.props.animateReveal ?? true) this.setupReveal(root, reduce);\n    this.setupCounters(root);\n    this.setupBear(root, reduce);\n    this.setupLightbox(root);\n    this.setupIdleShift(root, reduce);\n    this.setupSpy(root, accent);\n    this.applyGenderArc();\n    this.setupAudienceAnim(root, reduce);\n    this.setupBrandLogos();\n    this.loadSheetData();      // dati live dal Google Sheet (async, non blocca il render)\n    this.watchBundledResources(); // build standalone: forza un re-render quando window.__resources è pronto\n  }\n\n  // Nella build standalone (offline) le thumbnail video e i loghi brand arrivano da window.__resources\n  // (blob URL). Se diventano disponibili dopo il primo render, forziamo un aggiornamento per usarli.\n  watchBundledResources() {\n    if (typeof window === 'undefined' || this._resWatch) return;\n    this._resWatch = true;\n    let tries = 0;\n    const tick = () => {\n      if (window.__resources && Object.keys(window.__resources).length) { this.forceUpdate(); return; }\n      if (tries++ < 60) setTimeout(tick, 50); // ~3s di tentativi, poi si lascia il fallback remoto\n    };\n    tick();\n  }\n\n  buildParticles(root, reduce) {\n    if (reduce) return;\n    const host = root.querySelector('[data-particles]');\n    if (!host) return;\n    const n = 15;\n    for (let i = 0; i < n; i++) {\n      const p = document.createElement('span');\n      p.className = 'gc-particle';\n      const sz = 3 + Math.random() * 5;\n      p.style.width = sz + 'px';\n      p.style.height = sz + 'px';\n      p.style.left = (Math.random() * 100).toFixed(2) + '%';\n      p.style.top = (Math.random() * 100).toFixed(2) + '%';\n      p.style.opacity = (0.15 + Math.random() * 0.2).toFixed(2);\n      p.style.setProperty('--dx', (Math.random() * 120 - 60).toFixed(0) + 'px');\n      p.style.setProperty('--dy', (-20 - Math.random() * 120).toFixed(0) + 'px');\n      const dur = (10 + Math.random() * 12);\n      p.style.animation = 'gcDrift ' + dur.toFixed(1) + 's ease-in-out ' + (-Math.random() * dur).toFixed(1) + 's infinite';\n      host.appendChild(p);\n    }\n  }\n\n  setupReveal(root, reduce) {\n    if (reduce || !('IntersectionObserver' in window)) return;\n    root.classList.add('gc-js');\n    const io = new IntersectionObserver((ents) => {\n      ents.forEach(e => {\n        if (!e.isIntersecting) return;\n        const el = e.target;\n        let idx = 0;\n        const parent = el.parentElement;\n        if (parent) {\n          const sibs = [...parent.children].filter(c => c.hasAttribute('data-rv'));\n          idx = Math.max(0, sibs.indexOf(el));\n        }\n        setTimeout(() => el.classList.add('gc-in'), idx * 80);\n        io.unobserve(el);\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n    root.querySelectorAll('[data-rv]').forEach(el => io.observe(el));\n  }\n\n  setupCounters(root) {\n    const sec = root.querySelector('[data-stats]') || root;\n    if (!sec.querySelectorAll('[data-count]').length || typeof requestAnimationFrame !== 'function') return;\n    const setVal = (el, p) => {\n      const e2 = 1 - Math.pow(1 - p, 3);\n      const t = parseFloat(el.getAttribute('data-count'));\n      const dec = parseInt(el.getAttribute('data-dec') || '0', 10);\n      el.textContent = this.fmt(t * e2, dec) + (el.getAttribute('data-suffix') || '');\n    };\n    const zero = () => sec.querySelectorAll('[data-count]').forEach(el => setVal(el, 0));\n    const run = () => {\n      const els = [...sec.querySelectorAll('[data-count]')];\n      const dur = 1500, st = performance.now();\n      const step = (now) => {\n        const p = Math.min(1, (now - st) / dur);\n        els.forEach(el => setVal(el, p));\n        if (p < 1) requestAnimationFrame(step);\n      };\n      requestAnimationFrame(step);\n    };\n    this._statSetZero = zero;\n    this._statSetFull = () => sec.querySelectorAll('[data-count]').forEach(el => setVal(el, 1));\n    zero(); // partono da 0 finché la sezione non entra nel viewport\n    const trigger = () => {\n      if (this._statShown) return;\n      this._statShown = true;\n      zero();\n      run();\n      if (this._statIO) { try { this._statIO.disconnect(); } catch (e) {} this._statIO = null; }\n      window.removeEventListener('scroll', onScroll);\n    };\n    const inView = () => {\n      const t = document.querySelector('[data-stats]') || sec;\n      const r = t.getBoundingClientRect();\n      const vh = window.innerHeight || document.documentElement.clientHeight || 0;\n      return r.top < vh * 0.85 && r.bottom > vh * 0.08;\n    };\n    const onScroll = () => { if (inView()) trigger(); };\n    if ('IntersectionObserver' in window) {\n      this._statIO = new IntersectionObserver((ents) => {\n        ents.forEach(e => { if (e.isIntersecting) trigger(); });\n      }, { threshold: 0.2 });\n      this._statIO.observe(sec);\n    }\n    window.addEventListener('scroll', onScroll, { passive: true });\n    const poll = () => {\n      if (this._statShown) return;\n      if (inView()) { trigger(); return; }\n      setTimeout(poll, 200);\n    };\n    setTimeout(poll, 200);\n  }\n\n  setupBear(root, reduce) {\n    // hero: fade-out + parallax (si muove verso l'alto piu' lentamente dello scroll)\n    const par = root.querySelector('[data-bear-parallax]');\n    if (par && !reduce) {\n      const onScroll = () => {\n        const y = window.scrollY || 0;\n        const t = Math.min(1, y / 520);\n        par.style.transform = 'translateY(' + (y * 0.32).toFixed(1) + 'px)';\n        par.style.opacity = String(Math.max(0, 1 - t));\n      };\n      window.addEventListener('scroll', onScroll, { passive: true });\n      onScroll();\n    }\n    // contatti: fade-in con scala da 0.8 a 1\n    const cl = root.querySelector('[data-bear-contact]');\n    if (cl) {\n      cl.style.transition = 'opacity .9s ease, transform .9s cubic-bezier(.2,.7,.2,1)';\n      if (!reduce && 'IntersectionObserver' in window) {\n        cl.style.opacity = '0';\n        cl.style.transform = 'scale(.8)';\n        const io = new IntersectionObserver((ents) => {\n          ents.forEach(e => {\n            if (e.isIntersecting) {\n              cl.style.opacity = '.92';\n              cl.style.transform = 'scale(1)';\n              io.disconnect();\n            }\n          });\n        }, { threshold: 0.3 });\n        io.observe(cl);\n      }\n    }\n    // easter egg: doppio click -> shake + bounce\n    root.querySelectorAll('.bear-img').forEach(img => {\n      img.addEventListener('dblclick', () => {\n        img.style.animation = 'none';\n        void img.offsetWidth;\n        img.style.animation = 'bearShake .5s ease, bearBounce .4s ease .5s';\n        setTimeout(() => { img.style.animation = ''; }, 950);\n      });\n    });\n  }\n\n  setupLightbox(root) {\n    const lb = root.querySelector('[data-lightbox]');\n    const frame = root.querySelector('[data-lb-frame]');\n    if (!lb || !frame) return;\n    const open = (id) => {\n      frame.src = 'https://www.youtube.com/embed/' + id + '?autoplay=1';\n      lb.style.display = 'flex';\n      requestAnimationFrame(() => { lb.style.opacity = '1'; });\n      document.body.style.overflow = 'hidden';\n    };\n    const close = () => {\n      lb.style.opacity = '0';\n      document.body.style.overflow = '';\n      setTimeout(() => { lb.style.display = 'none'; frame.src = ''; }, 250);\n    };\n    root.querySelectorAll('[data-video-id]').forEach(c => {\n      c.addEventListener('click', () => open(c.getAttribute('data-video-id')));\n    });\n    lb.addEventListener('click', (e) => {\n      if (e.target === lb || (e.target.hasAttribute && e.target.hasAttribute('data-lb-close'))) close();\n    });\n    document.addEventListener('keydown', (e) => {\n      if (e.key === 'Escape' && lb.style.display === 'flex') close();\n    });\n  }\n\n  setupIdleShift(root, reduce) {\n    if (reduce) return;\n    const secs = [...root.querySelectorAll('.gc-light-shift')];\n    if (!secs.length) return;\n    let timer;\n    const idle = () => secs.forEach(s => s.classList.add('gc-idle'));\n    const wake = () => {\n      secs.forEach(s => s.classList.remove('gc-idle'));\n      clearTimeout(timer);\n      timer = setTimeout(idle, 3000);\n    };\n    ['mousemove', 'scroll', 'touchstart', 'keydown'].forEach(ev => window.addEventListener(ev, wake, { passive: true }));\n    timer = setTimeout(idle, 3000);\n  }\n\n  setupSpy(root, accent) {\n    const ids = ['profilo', 'perche', 'audience', 'formati', 'brand', 'contatti'];\n    const links = {};\n    root.querySelectorAll('[data-nav-link]').forEach(l => links[l.getAttribute('data-nav-link')] = l);\n    const onScroll = () => {\n      const y = window.scrollY + 130;\n      let cur = ids[0];\n      ids.forEach(id => { const s = document.getElementById(id); if (s && s.offsetTop <= y) cur = id; });\n      Object.keys(links).forEach(k => { links[k].style.color = (k === cur) ? accent : 'rgba(0,24,69,.55)'; });\n    };\n    window.addEventListener('scroll', onScroll, { passive: true });\n    onScroll();\n  }\n\n  // I loghi dei brand: se l'URL non e' raggiungibile, l'alt viene mostrato come wordmark pulito\n  setupBrandLogos() {\n    const root = document.getElementById('gc-mediakit'); if (!root) return;\n    root.querySelectorAll('img[data-brand-logo]').forEach(img => {\n      const fail = () => { img.style.cssText = 'font-family:var(--font-body);font-size:19px;font-weight:800;letter-spacing:-.01em;color:var(--color-text-primary);max-width:none;max-height:none;'; };\n      img.onerror = fail;\n      if (img.complete && img.naturalWidth === 0 && img.getAttribute('src')) fail();\n    });\n  }\n\n  // Animazione on-scroll dei grafici audience: barre dal basso, donut progressivo, percentuali da 0.\n  // Ri-interroga sempre i nodi correnti (robusto ai re-render) e usa IntersectionObserver + fallback su scroll.\n  setupAudienceAnim(root, reduce) {\n    const sec = document.getElementById('audience');\n    if (!sec) return;\n    const circ = 2 * Math.PI * 80;\n    const setZero = () => {\n      sec.querySelectorAll('[data-grow]').forEach(b => { if (b.getAttribute('data-grow') === 'h') b.style.height = '0%'; else b.style.width = '0%'; });\n      sec.querySelectorAll('[data-acount]').forEach(c => { c.textContent = '0%'; });\n      const arc = sec.querySelector('[data-gender-arc]');\n      if (arc) arc.setAttribute('stroke-dasharray', '0 ' + circ.toFixed(2));\n    };\n    const fill = () => {\n      sec.querySelectorAll('[data-grow]').forEach(b => { const v = b.getAttribute('data-val') || '0%'; if (b.getAttribute('data-grow') === 'h') b.style.height = v; else b.style.width = v; });\n      this.applyGenderArc();\n      sec.querySelectorAll('[data-acount]').forEach(c => this.animateCount(c));\n    };\n    this._audSetZero = setZero;\n    if (reduce) { this._audShown = true; fill(); return; }\n    setZero();\n    const trigger = () => {\n      if (this._audShown) return;\n      this._audShown = true;\n      requestAnimationFrame(fill);\n      if (this._audIO) { try { this._audIO.disconnect(); } catch (e) {} this._audIO = null; }\n      window.removeEventListener('scroll', onScroll);\n    };\n    // visibilità calcolata sempre sui nodi correnti (robusto ai re-render di React)\n    const inView = () => {\n      const t = document.querySelector('#audience [data-aud-charts]') || document.getElementById('audience');\n      if (!t) return false;\n      const r = t.getBoundingClientRect();\n      const vh = window.innerHeight || document.documentElement.clientHeight || 0;\n      return r.top < vh * 0.9 && r.bottom > vh * 0.06;\n    };\n    const onScroll = () => { if (inView()) trigger(); };\n    // 1) IntersectionObserver (quando disponibile e funzionante)\n    if ('IntersectionObserver' in window) {\n      const tgt = sec.querySelector('[data-aud-charts]') || sec;\n      this._audIO = new IntersectionObserver((ents) => {\n        ents.forEach(e => { if (e.isIntersecting) trigger(); });\n      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n      this._audIO.observe(tgt);\n    }\n    // 2) Fallback su scroll + 3) poll rAF: garantisce il trigger anche dove\n    //    IntersectionObserver non scatta in modo affidabile (alcuni iframe/preview).\n    window.addEventListener('scroll', onScroll, { passive: true });\n    const poll = () => {\n      if (this._audShown) return;\n      if (inView()) { trigger(); return; }\n      setTimeout(poll, 200);\n    };\n    setTimeout(poll, 200);\n  }\n\n  animateCount(el) {\n    const target = parseFloat(el.getAttribute('data-acount')) || 0;\n    if (typeof requestAnimationFrame !== 'function') { el.textContent = Math.round(target) + '%'; return; }\n    const dur = 1300, st = performance.now();\n    const step = (now) => {\n      const p = Math.min(1, (now - st) / dur);\n      const e = 1 - Math.pow(1 - p, 3);\n      el.textContent = Math.round(target * e) + '%';\n      if (p < 1) requestAnimationFrame(step);\n    };\n    requestAnimationFrame(step);\n  }\n\n  renderVals() {\n    // Priorita' dei dati: default hardcoded < Google Sheet (live)\n    const sd = this.state.sheet || {};\n    const RES = (typeof window !== 'undefined' && window.__resources) || {};\n    // ogni metrica: chiave foglio, valore di default (numerico), modalita' di formato, suffisso, etichetta, delta\n    const stat = (key, defNum, mode, suffix, l, d) => {\n      const val = this.toNumber(sd[key], defNum);\n      const f = this.formatMetric(val, mode, suffix);\n      return { v: f.display, c: f.c, dec: f.dec, suffix: f.suffix, l, d };\n    };\n    const viewsStat = stat('views_28gg', 1220000, 'int', '', 'Visualizzazioni', '+107,6%');\n    viewsStat.kpi = 'views';\n    const stats = [\n      viewsStat,\n      stat('nuovi_iscritti_28gg', 9973, 'int', '', 'Nuovi iscritti', '+34,1%'),\n      stat('impressioni_28gg', 9110000, 'int', '', 'Impressioni', '+12,3%'),\n      stat('watch_time_ore_28gg', 56783, 'int', 'h', 'Ore di watch time', '+9,8%'),\n    ];\n    // Iscritti totali: letti esclusivamente dal Google Sheet (chiave iscritti_totali), con fallback al valore di default\n    const subsNum = this.toNumber(sd.iscritti_totali, 106000);\n    const heroCount = this.formatMetric(subsNum, 'int', '+').display;\n    const heroCountNum = String(subsNum);   // valore numerico per l'animazione del contatore (data-count)\n\n    const pillars = [\n      { k: '01', t: 'Intelligenza Artificiale', d: 'Tool, agenti e workflow pratici.', mkt: \"Il 92% delle aziende aumenterà gli investimenti in AI. I brand AI che usano creator marketing generano 4,2x il ROI di qualsiasi altro settore.\" },\n      { k: '02', t: 'Finanza Personale', d: 'Investimenti, risparmio, ETF.', mkt: \"Gli sponsor su canali finance YouTube convertono 3-5x rispetto a gaming e lifestyle. CPM medio $50-200: la nicchia più remunerativa della piattaforma.\" },\n      { k: '03', t: 'Produttività', d: 'Sistemi, automazioni, soft skill.', mkt: \"Le campagne creator B2B generano fino a 11x il ROI della pubblicità digitale tradizionale. L'85% dei marketer B2B ha investito in creator marketing nel 2024.\" },\n    ];\n\n    const reasons = [\n      { n: '01', tag: 'CRESCITA', t: 'Canale in forte crescita', d: 'Crescita costante anno su anno, con un pubblico che si rinnova senza perdere qualità. Brand come Revolut e Higgsfield hanno già scelto questo canale per posizionarsi sulla nicchia.' },\n      { n: '02', tag: 'AUDIENCE', t: 'Audience altamente targetizzata', d: 'Il pubblico è composto da professionisti che comprano tool, corsi e servizi. CTR medio del 4,25% su oltre 9M di impression.' },\n      { n: '03', tag: 'INTEGRAZIONE', t: 'Integrazione autentica', d: 'Niente spot pubblicitari: il prodotto si integra nel contenuto in modo narrativo, testato e credibile, con tassi di retention sopra la media.' },\n    ];\n\n    const collabResults = [\n      { cat: 'Broker di investimenti online', fmt: 'Integrazione YouTube', ctr: '2,8%', clicks: '2.180', period: '7 GIORNI' },\n      { cat: 'Exchange crypto', fmt: 'Integrazione YouTube', ctr: '3,1%', clicks: '1.650', period: '7 GIORNI' },\n    ];\n\n    const ytThumb = (id) => 'https://img.youtube.com/vi/' + id + '/maxresdefault.jpg';\n    // Views formattate con il punto come separatore delle migliaia (es. 107.533)\n    const fmtViews = (v) => {\n      const n = parseInt(String(v == null ? '' : v).replace(/[^0-9]/g, ''), 10);\n      return isNaN(n) ? '' : n.toLocaleString('it-IT');\n    };\n    // VIDEO_ID, titolo e views letti ESCLUSIVAMENTE dal Google Sheet (video1_id/_title/_views, video2_*, video3_*).\n    // Nessun titolo di fallback hardcoded: se il Sheet non fornisce il titolo, resta vuoto.\n    const topContent = [\n      { sheetKey: 'video1', defId: 'LwHYIyPx_2Y', defViews: '393626' },\n      { sheetKey: 'video2', defId: '7A9O15nq5Yw', defViews: '59632' },\n      { sheetKey: 'video3', defId: 'aqQqIJ6PrWA', defViews: '58382' },\n    ].map((c) => {\n      const id = (sd[c.sheetKey + '_id'] && String(sd[c.sheetKey + '_id']).trim()) || c.defId;\n      const title = (sd[c.sheetKey + '_title'] && String(sd[c.sheetKey + '_title']).trim()) || '';\n      const rawViews = (sd[c.sheetKey + '_views'] && String(sd[c.sheetKey + '_views']).trim()) || c.defViews;\n      return { id, title, views: fmtViews(rawViews), thumb: ytThumb(id) };\n    });\n\n    const personas = [\n      { n: '01', t: 'Istruiti & curiosi', d: \"Cercano risposte, non intrattenimento. Laureati e professionisti che usano YouTube come strumento di aggiornamento.\" },\n      { n: '02', t: '25–40 anni', d: \"L'età in cui si prendono le decisioni finanziarie più importanti. Alto potere d'acquisto, alta propensione all'azione.\" },\n      { n: '03', t: 'Tech-geek', d: \"Adottano nuovi tool prima di tutti gli altri. Se Giuseppe lo consiglia, lo provano.\" },\n      { n: '04', t: 'Investitori attivi', d: \"Già nel mercato o in procinto di entrarci. Cercano conferme da voci di cui si fidano, non da banner pubblicitari.\" },\n      { n: '05', t: 'Italia-first', d: \"Un'audience compatta, geograficamente concentrata, con engagement reale. Niente follower fantasma.\" },\n      { n: '06', t: 'Multi-piattaforma', d: \"Lo seguono su YouTube, lo rileggono su Instagram, lo aspettano in newsletter. Touchpoint multipli, fiducia moltiplicata.\" },\n    ];\n\n    const ageRaw = [\n      { label2: '18–24', v: this.parseNum(sd.eta_18_24, 14) },\n      { label2: '25–34', v: this.parseNum(sd.eta_25_34, 41) },\n      { label2: '35–44', v: this.parseNum(sd.eta_35_44, 28) },\n      { label2: '45–54', v: this.parseNum(sd.eta_45_54, 12) },\n      { label2: '55+', v: this.parseNum(sd.eta_55plus, 5) },\n    ];\n    const ageMax = Math.max(1, ...ageRaw.map(a => a.v));\n    const ageBars = ageRaw.map(a => ({ label2: a.label2, label: a.v + '%', hpct: Math.round(a.v / ageMax * 100) + '%', num: a.v }));\n\n    const genderMen = this.parseNum(sd.genere_uomini, 78);\n    const genderWomen = this.parseNum(sd.genere_donne, 22);\n\n    const geoRaw = [\n      { label: 'Italia', v: this.parseNum(sd.geo_italia, 86) },\n      { label: 'Svizzera', v: this.parseNum(sd.geo_svizzera, 4) },\n      { label: 'Germania', v: this.parseNum(sd.geo_germania, 3) },\n      { label: 'Regno Unito', v: this.parseNum(sd.geo_regno_unito, 2) },\n      { label: 'Altri', v: this.parseNum(sd.geo_altri, 5) },\n    ];\n    const geoMax = Math.max(1, ...geoRaw.map(g => g.v));\n    const geoBars = geoRaw.map(g => ({ label: g.label, pct: g.v + '%', wpct: Math.round(g.v / geoMax * 100) + '%', num: g.v }));\n\n    const formats = [\n      { k: 'A', t: 'Integration', d: \"Il formato che funziona. 60-90 secondi integrati nel racconto, non interrotti. Il brand entra nel contesto, non nel mezzo.\", inc: 'Script condiviso · 1 revisione · report post-pubblicazione',\n        long: \"CTR medio sui video del canale tra il 6,2% e il 7,8%, oltre il doppio della media YouTube. L'audience clicca perché si fida, non perché è obbligata.\",\n        mailto: 'mailto:Info@giuseppecastagna.it?subject=Interesse%20pacchetto%20Integration&body=Salve%2C%20sono%20interessato%20al%20pacchetto%20Integration.' },\n      { k: 'B', t: 'Video Dedicato', d: \"Un video dedicato al brand. 9,3 milioni di visualizzazioni totali con oltre il 50% di retention rate.\", inc: 'Co-creazione concept · 2 revisioni script · link + codice · report analitico',\n        long: \"Retention sopra la media di piattaforma anche su video di oltre 18 minuti. Un pubblico che resta è un pubblico che ascolta.\",\n        mailto: 'mailto:Info@giuseppecastagna.it?subject=Interesse%20pacchetto%20Video%20Dedicato&body=Salve%2C%20sono%20interessato%20al%20pacchetto%20Video%20Dedicato.' },\n      { k: 'C', t: 'Pacchetto Multi-Video', d: \"Presenza su 3-5 video in un arco concordato. Il brand recall si costruisce con la ripetizione, non con un'unica apparizione.\", inc: 'Calendario editoriale concordato · creatività coerente · report consolidato',\n        long: \"Il formato ideale per campagne di posizionamento a lungo termine. Creatività coerente, calendario editoriale condiviso, report consolidato finale.\",\n        mailto: 'mailto:Info@giuseppecastagna.it?subject=Interesse%20pacchetto%20Multi-Video&body=Salve%2C%20sono%20interessato%20al%20pacchetto%20Multi-Video.' },\n      { k: 'D', t: 'Newsletter + Community', d: \"6.413 iscritti alla newsletter. Un pubblico che ha scelto attivamente di ricevere consigli da Giuseppe nella propria casella email.\", inc: 'Testo approvato dal brand · link tracciato · screenshot di conferma invio',\n        long: \"Touch point diretto, senza algoritmi di mezzo. Il brand arriva dove l'attenzione è massima e la concorrenza è zero.\",\n        mailto: 'mailto:Info@giuseppecastagna.it?subject=Interesse%20pacchetto%20Newsletter%20Community&body=Salve%2C%20sono%20interessato%20al%20pacchetto%20Newsletter%20e%20Community.' },\n    ];\n\n    const LOGO_BASE = 'https://jacopo-svg.github.io/mediakit-giuseppe-castagna/logos/';\n    const logoBrand = (name, file, key) => ({ name, logo: RES[key] || (LOGO_BASE + file), bg: 'var(--color-card)', border: '1px solid var(--color-hairline)' });\n    const brands = [\n      logoBrand('Revolut', 'Revolut-retail-wordmark-black%20(2)%20(1).png', 'revolut'),\n      logoBrand('Higgsfield', 'higgsfield_ai-logo-brandlogos.net-c221a.png', 'higgsfield'),\n      logoBrand('Scalable Capital', 'Scalable-black.png', 'scalable'),\n      logoBrand('Kraken', 'kraken-logo_brandlogos.net_ftc8y.png', 'kraken'),\n      logoBrand('XTB', 'xtb-seeklogo.svg', 'xtb'),\n      logoBrand('Trading.com', 'tradingdotcom%20logo%20light%20bg.png', 'trading'),\n      { name: 'Il prossimo sei tu →', text: true, bg: 'var(--color-accent)', border: '1px solid var(--color-accent)', color: 'var(--color-bg-light)', size: '15px', weight: '700' },\n    ];\n\n\n    const nav = [\n      { label: 'Profilo', href: '#profilo', id: 'profilo' },\n      { label: 'Perché Giuseppe', href: '#perche', id: 'perche' },\n      { label: 'Audience', href: '#audience', id: 'audience' },\n      { label: 'Formati', href: '#formati', id: 'formati' },\n      { label: 'Brand', href: '#brand', id: 'brand' },\n    ];\n\n    return {\n      stats, heroCount, heroCountNum, pillars, reasons, collabResults, topContent, personas, ageBars, geoBars, formats, brands, nav,\n      genderMenPct: genderMen + '%',\n      genderWomenPct: genderWomen + '%',\n      genderMenNum: genderMen,\n      genderWomenNum: genderWomen,\n      sheetUpdated: (sd.ultimo_aggiornamento && sd.ultimo_aggiornamento.trim()) || '—',\n      showTopContent: this.props.showTopContent ?? true,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +
              'var n = p[j], tn = n && n.tagName;' +
              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c5181798-b54a-4abd-94da-2099c8d55604\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root {\n  /* === COLORI === */\n  --color-bg-dark: #001845;\n  --color-bg-light: #fff8ec;\n  --color-bg-mid: #f3f6f6;\n  --color-accent: #206de5;\n  --color-accent-soft: #bfdbf7;\n  --color-text-on-dark: rgba(255,248,236,1);\n  --color-text-on-dark-muted: rgba(255,248,236,0.6);\n  --color-text-primary: #001845;\n  --color-text-muted: rgba(0,24,69,0.6);\n  --color-card: #ffffff;\n  --color-hairline: rgba(0,24,69,0.09);\n  --color-hairline-dark: rgba(255,248,236,0.12);\n\n  /* === FONT === */\n  --font-body: 'Hanken Grotesk', system-ui, sans-serif;\n  --font-mono: 'Space Mono', monospace;\n\n  /* === SPAZIATURE === */\n  --section-padding-v: clamp(72px, 9vw, 124px);\n  --section-padding-h: clamp(18px, 5vw, 64px);\n  --max-width: 1180px;\n\n  /* === BORDER RADIUS === */\n  --radius-pill: 999px;\n  --radius-card: 24px;\n  --radius-card-sm: 18px;\n\n  /* === ANIMAZIONI === */\n  --transition-fast: 0.2s ease;\n  --transition-medium: 0.32s cubic-bezier(.2,.7,.2,1);\n  --transition-expand: 0.35s cubic-bezier(.2,.7,.2,1);\n}\n* { box-sizing: border-box; }\nhtml { scroll-behavior: smooth; }\nbody { margin: 0; background: var(--color-bg-mid); color: var(--color-text-primary); font-family: var(--font-body); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }\n::selection { background: var(--color-accent); color: var(--color-bg-light); }\na { color: inherit; text-decoration: none; }\n\n/* reveal-on-scroll (attivo solo con JS; senza JS tutto resta visibile) */\n#gc-mediakit.gc-js [data-rv] { opacity: 0; transform: translateY(24px); transition: opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1); }\n#gc-mediakit.gc-js [data-rv].gc-in { opacity: 1; transform: none; }\n\n/* logo orso */\n.bear-breathe { display: inline-flex; transform-origin: center; }\n.bear-img { transition: transform .3s cubic-bezier(.34,1.56,.64,1); cursor: pointer; }\n.bear-img:hover { transform: scale(1.12); }\n@media (prefers-reduced-motion: no-preference) {\n  .bear-breathe { animation: bearBreathe 3s ease-in-out infinite; }\n}\n@keyframes bearBreathe { 0%,100% { transform: scale(1) rotate(-2deg); } 50% { transform: scale(1.04) rotate(2deg); } }\n@keyframes bearShake { 0%,100% { transform: translateX(0); } 10%,30%,50%,70%,90% { transform: translateX(-8px); } 20%,40%,60%,80% { transform: translateX(8px); } }\n@keyframes bearBounce { 0% { transform: scale(1); } 30% { transform: scale(1.14); } 50% { transform: scale(.94); } 70% { transform: scale(1.05); } 100% { transform: scale(1); } }\n\n/* particelle */\n.gc-particle { position: absolute; border-radius: 50%; background: var(--color-accent); pointer-events: none; will-change: transform; }\n@keyframes gcDrift { 0% { transform: translate(0,0); } 50% { transform: translate(var(--dx), var(--dy)); } 100% { transform: translate(0,0); } }\n@media (prefers-reduced-motion: reduce) { .gc-particle { display: none; } }\n\n/* card video con lightbox */\n.vcard { position: relative; border-radius: var(--radius-card-sm); overflow: hidden; cursor: pointer; background-size: cover; background-position: center; min-height: 208px; display: flex; flex-direction: column; justify-content: space-between; }\n.vcard-overlay { position: absolute; inset: 0; background: rgba(0,12,34,.4); transition: background var(--transition-medium); }\n.vcard:hover .vcard-overlay { background: rgba(0,12,34,.2); }\n.vcard-play { position: absolute; inset: 0; margin: auto; width: 62px; height: 62px; z-index: 3; opacity: 0; transform: scale(.8); transition: opacity var(--transition-medium), transform var(--transition-medium); }\n.vcard:hover .vcard-play { opacity: 1; transform: scale(1); }\n\n/* formati: hover-expand */\n#gc-mediakit [data-fmt] { align-self: start; }\n.fmt-letter { transition: background var(--transition-medium), color var(--transition-medium), border-color var(--transition-medium); }\n[data-fmt]:hover .fmt-letter { background: var(--color-accent); color: var(--color-bg-light); border-color: var(--color-accent); }\n.fmt-detail { max-height: 0; opacity: 0; overflow: hidden; transition: max-height var(--transition-expand), opacity var(--transition-expand), margin-top var(--transition-expand); }\n[data-fmt]:hover .fmt-detail { max-height: 560px; opacity: 1; margin-top: 14px; }\n\n/* CTA secondaria */\n.cta-sec { display: inline-block; border: 1.6px solid var(--color-accent); color: var(--color-accent); font-family: var(--font-body); font-weight: 700; font-size: 13px; padding: 10px 18px; border-radius: var(--radius-pill); transition: transform var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast), color var(--transition-fast); }\n.cta-sec:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(32,109,229,.32); background: var(--color-accent); color: var(--color-bg-light); }\n\n/* hue shift impercettibile su sezioni chiare quando il mouse è fermo */\n.gc-light-shift { transition: filter 2.4s ease; }\n.gc-light-shift.gc-idle { filter: hue-rotate(6deg) saturate(1.03); }\n\n@media (max-width: 840px) { #gc-mediakit [data-desktopnav] { display: none !important; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div id=\"gc-mediakit\" style=\"overflow-x:hidden;\">\n\n  <header style=\"position:fixed;top:0;left:0;right:0;z-index:100;height:66px;display:flex;align-items:center;backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);background:rgba(243,246,246,.82);border-bottom:1px solid var :1;cursor:pointer;font-family:var(--font-body);\">×<\u002Fbutton>\n      <div style=\"position:relative;width:100%;aspect-ratio:16/9;border-radius:14px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.5);background:#000;\">\n        <iframe data-lb-frame=\"\" src=\"\" title=\"Video YouTube\" allow=\"autoplay; encrypted-media; picture-in-picture\" allowfullscreen=\"\" style=\"position:absolute;inset:0;width:100%;height:100%;border:0;\"><\u002Fiframe>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;},&quot;showTopContent&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;animateReveal&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#206de5&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  // URL del Google Sheet pubblico in formato CSV (colonna A = chiave, colonna B = valore)\n  static SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCTqKfch-00YQubiQrembBbjphN9W98XgIvL8TRlCOFhvCJB95b3dcVVYJ2yNV08x_pPG2NP-r3fSc/pub?gid=0&single=true&output=csv';\n\n  state = { sheet: null };\n\n  fmt(n, dec) {\n    return Number(n).toLocaleString('it-IT', { minimumFractionDigits: dec, maximumFractionDigits: dec, useGrouping: 'always' });\n  }\n\n  // --- Lettura dati dal Google Sheet (con fallback silenzioso ai valori hardcoded) ---\n  async loadSheetData() {\n    try {\n      const res = await fetch(Component.SHEET_CSV_URL, { cache: 'no-store' });\n      if (!res.ok) return;                       // fallback silenzioso\n      const text = await res.text();\n      const rows = this.parseCSV(text);\n      const data = {};\n      rows.forEach(r => { if (r.length >= 2 && r[0]) data[String(r[0]).trim()] = (r[1] == null ? '' : String(r[1])).trim(); });\n      if (Object.keys(data).length) this.setState({ sheet: data });  // re-render -> renderVals applica i nuovi valori\n    } catch (e) {\n      /* fetch fallito / offline / CORS: si usano silenziosamente i valori hardcoded */\n    }\n  }\n\n  // CSV parser minimale che rispetta i campi tra virgolette (i valori possono contenere la virgola decimale)\n  parseCSV(text) {\n    const rows = [];\n    let row = [], field = '', inQ = false;\n    for (let i = 0; i < text.length; i++) {\n      const ch = text[i];\n      if (inQ) {\n        if (ch === '\"') { if (text[i + 1] === '\"') { field += '\"'; i++; } else inQ = false; }\n        else field += ch;\n      } else if (ch === '\"') inQ = true;\n      else if (ch === ',') { row.push(field); field = ''; }\n      else if (ch === '\\n' || ch === '\\r') {\n        if (ch === '\\r' && text[i + 1] === '\\n') i++;\n        row.push(field); field = '';\n        if (row.some(c => c !== '')) rows.push(row);\n        row = [];\n      } else field += ch;\n    }\n    if (field !== '' || row.length) { row.push(field); if (row.some(c => c !== '')) rows.push(row); }\n    return rows;\n  }\n\n  // \"1,22M\" -> {num:1.22, dec:2, suffix:'M', display:'1,22M'} ; \"9.973\" -> {num:9973, dec:0, suffix:''}\n  parseMetric(str, def) {\n    const raw = (str == null || String(str).trim() === '') ? def : String(str);\n    const s = String(raw).trim();\n    const m = s.match(/^([\\d.,\\s]+)\\s*(.*)$/);\n    const numPart = m ? m[1].trim() : s;\n    const suffix = m ? m[2].trim() : '';\n    const normalized = numPart.replace(/\\s/g, '').replace(/\\./g, '').replace(/,/g, '.');\n    let num = parseFloat(normalized); if (isNaN(num)) num = 0;\n    let dec = 0; const ci = numPart.indexOf(','); if (ci >= 0) dec = numPart.length - ci - 1;\n    return { num, dec, suffix, display: s };\n  }\n\n  // estrae solo il valore numerico (per barre e percentuali): \"41%\" -> 41\n  parseNum(str, def) {\n    if (str == null || String(str).trim() === '') return def;\n    const n = parseFloat(String(str).replace(/[^\\d.,-]/g, '').replace(/\\./g, '').replace(/,/g, '.'));\n    return isNaN(n) ? def : n;\n  }\n\n  // risolve la magnitudine reale: \"1220000\" -> 1220000 ; \"1,22M\" -> 1220000 ; \"9.973\" -> 9973\n  toNumber(str, def) {\n    if (str == null || String(str).trim() === '') return def;\n    const p = this.parseMetric(str, '0');\n    let n = p.num; const s = (p.suffix || '').toLowerCase();\n    if (s.indexOf('m') >= 0) n *= 1e6;\n    else if (s.indexOf('k') >= 0 || s.indexOf('mila') >= 0) n *= 1e3;\n    return isNaN(n) ? def : n;\n  }\n\n  // formatta un numero grezzo in {display, c, dec, suffix} secondo la modalita' della metrica\n  // mode 'M' -> \"1,22M\" (milioni) ; mode 'int' -> \"56.783\" con eventuale suffisso (h, +, ...)\n  formatMetric(value, mode, suffix) {\n    suffix = suffix || '';\n    if (mode === 'M') {\n      const m = value / 1e6;\n      return { display: this.fmt(m, 2) + 'M', c: String(m), dec: '2', suffix: 'M' };\n    }\n    return { display: this.fmt(value, 0) + suffix, c: String(value), dec: '0', suffix };\n  }\n\n  applyGenderArc() {\n    const root = document.getElementById('gc-mediakit');\n    const arc = root && root.querySelector('[data-gender-arc]');\n    if (!arc) return;\n    const men = this.parseNum((this.state.sheet || {}).genere_uomini, 78);\n    const circ = 2 * Math.PI * 80;\n    arc.setAttribute('stroke-dasharray', (circ * Math.max(0, Math.min(100, men)) / 100).toFixed(2) + ' ' + circ.toFixed(2));\n  }\n\n  componentDidUpdate() {\n    this.applyGenderArc();\n    // segnala visivamente l'avvenuto aggiornamento dai dati live\n    const dot = document.querySelector('[data-sheet-dot]');\n    if (dot && this.state.sheet) dot.style.background = 'var(--color-accent)';\n  }\n\n  componentDidMount() {\n    const root = document.getElementById('gc-mediakit');\n    if (!root) return;\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n    // accent override -> basta cambiare la variabile CSS\n    if (this.props.accent && this.props.accent.toLowerCase() !== '#206de5') {\n      root.style.setProperty('--color-accent', this.props.accent);\n    }\n    const accent = (getComputedStyle(root).getPropertyValue('--color-accent').trim()) || '#206de5';\n\n    this.buildParticles(root, reduce);\n    if (this.props.animateReveal ?? true) this.setupReveal(root, reduce);\n    this.setupCounters(root);\n    this.setupBear(root, reduce);\n    this.setupLightbox(root);\n    this.setupIdleShift(root, reduce);\n    this.setupSpy(root, accent);\n    this.applyGenderArc();\n    this.loadSheetData();   // legge i dati live dal Google Sheet (async, non blocca il render)\n  }\n\n  buildParticles(root, reduce) {\n    if (reduce) return;\n    const host = root.querySelector('[data-particles]');\n    if (!host) return;\n    const n = 15;\n    for (let i = 0; i < n; i++) {\n      const p = document.createElement('span');\n      p.className = 'gc-particle';\n      const sz = 3 + Math.random() * 5;\n      p.style.width = sz + 'px';\n      p.style.height = sz + 'px';\n      p.style.left = (Math.random() * 100).toFixed(2) + '%';\n      p.style.top = (Math.random() * 100).toFixed(2) + '%';\n      p.style.opacity = (0.15 + Math.random() * 0.2).toFixed(2);\n      p.style.setProperty('--dx', (Math.random() * 120 - 60).toFixed(0) + 'px');\n      p.style.setProperty('--dy', (-20 - Math.random() * 120).toFixed(0) + 'px');\n      const dur = (10 + Math.random() * 12);\n      p.style.animation = 'gcDrift ' + dur.toFixed(1) + 's ease-in-out ' + (-Math.random() * dur).toFixed(1) + 's infinite';\n      host.appendChild(p);\n    }\n  }\n\n  setupReveal(root, reduce) {\n    if (reduce || !('IntersectionObserver' in window)) return;\n    root.classList.add('gc-js');\n    const io = new IntersectionObserver((ents) => {\n      ents.forEach(e => {\n        if (!e.isIntersecting) return;\n        const el = e.target;\n        let idx = 0;\n        const parent = el.parentElement;\n        if (parent) {\n          const sibs = [...parent.children].filter(c => c.hasAttribute('data-rv'));\n          idx = Math.max(0, sibs.indexOf(el));\n        }\n        setTimeout(() => el.classList.add('gc-in'), idx * 80);\n        io.unobserve(el);\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n    root.querySelectorAll('[data-rv]').forEach(el => io.observe(el));\n  }\n\n  setupCounters(root) {\n    const counters = [...root.querySelectorAll('[data-count]')];\n    if (!counters.length || typeof requestAnimationFrame !== 'function') return;\n    const band = root.querySelector('[data-stats]') || root;\n    const setVal = (el, p) => {\n      const e2 = 1 - Math.pow(1 - p, 3);\n      const t = parseFloat(el.getAttribute('data-count'));\n      const dec = parseInt(el.getAttribute('data-dec') || '0', 10);\n      el.textContent = this.fmt(t * e2, dec) + (el.getAttribute('data-suffix') || '');\n    };\n    let done = false;\n    const run = () => {\n      const dur = 1500, st = performance.now();\n      const step = (now) => {\n        const p = Math.min(1, (now - st) / dur);\n        counters.forEach(el => setVal(el, p));\n        if (p < 1) requestAnimationFrame(step);\n      };\n      requestAnimationFrame(step);\n    };\n    if ('IntersectionObserver' in window) {\n      const io = new IntersectionObserver((ents) => {\n        ents.forEach(e => {\n          if (e.isIntersecting && !done) {\n            done = true;\n            counters.forEach(el => setVal(el, 0));\n            run();\n            io.disconnect();\n          }\n        });\n      }, { threshold: 0.25 });\n      io.observe(band);\n    }\n  }\n\n  setupBear(root, reduce) {\n    // hero: fade-out + parallax (si muove verso l'alto piu' lentamente dello scroll)\n    const par = root.querySelector('[data-bear-parallax]');\n    if (par && !reduce) {\n      const onScroll = () => {\n        const y = window.scrollY || 0;\n        const t = Math.min(1, y / 520);\n        par.style.transform = 'translateY(' + (y * 0.32).toFixed(1) + 'px)';\n        par.style.opacity = String(Math.max(0, 1 - t));\n      };\n      window.addEventListener('scroll', onScroll, { passive: true });\n      onScroll();\n    }\n    // contatti: fade-in con scala da 0.8 a 1\n    const cl = root.querySelector('[data-bear-contact]');\n    if (cl) {\n      cl.style.transition = 'opacity .9s ease, transform .9s cubic-bezier(.2,.7,.2,1)';\n      if (!reduce && 'IntersectionObserver' in window) {\n        cl.style.opacity = '0';\n        cl.style.transform = 'scale(.8)';\n        const io = new IntersectionObserver((ents) => {\n          ents.forEach(e => {\n            if (e.isIntersecting) {\n              cl.style.opacity = '.92';\n              cl.style.transform = 'scale(1)';\n              io.disconnect();\n            }\n          });\n        }, { threshold: 0.3 });\n        io.observe(cl);\n      }\n    }\n    // easter egg: doppio click -> shake + bounce\n    root.querySelectorAll('.bear-img').forEach(img => {\n      img.addEventListener('dblclick', () => {\n        img.style.animation = 'none';\n        void img.offsetWidth;\n        img.style.animation = 'bearShake .5s ease, bearBounce .4s ease .5s';\n        setTimeout(() => { img.style.animation = ''; }, 950);\n      });\n    });\n  }\n\n  setupLightbox(root) {\n    const lb = root.querySelector('[data-lightbox]');\n    const frame = root.querySelector('[data-lb-frame]');\n    if (!lb || !frame) return;\n    const open = (id) => {\n      frame.src = 'https://www.youtube.com/embed/' + id + '?autoplay=1';\n      lb.style.display = 'flex';\n      requestAnimationFrame(() => { lb.style.opacity = '1'; });\n      document.body.style.overflow = 'hidden';\n    };\n    const close = () => {\n      lb.style.opacity = '0';\n      document.body.style.overflow = '';\n      setTimeout(() => { lb.style.display = 'none'; frame.src = ''; }, 250);\n    };\n    root.querySelectorAll('[data-video-id]').forEach(c => {\n      c.addEventListener('click', () => open(c.getAttribute('data-video-id')));\n    });\n    lb.addEventListener('click', (e) => {\n      if (e.target === lb || (e.target.hasAttribute && e.target.hasAttribute('data-lb-close'))) close();\n    });\n    document.addEventListener('keydown', (e) => {\n      if (e.key === 'Escape' && lb.style.display === 'flex') close();\n    });\n  }\n\n  setupIdleShift(root, reduce) {\n    if (reduce) return;\n    const secs = [...root.querySelectorAll('.gc-light-shift')];\n    if (!secs.length) return;\n    let timer;\n    const idle = () => secs.forEach(s => s.classList.add('gc-idle'));\n    const wake = () => {\n      secs.forEach(s => s.classList.remove('gc-idle'));\n      clearTimeout(timer);\n      timer = setTimeout(idle, 3000);\n    };\n    ['mousemove', 'scroll', 'touchstart', 'keydown'].forEach(ev => window.addEventListener(ev, wake, { passive: true }));\n    timer = setTimeout(idle, 3000);\n  }\n\n  setupSpy(root, accent) {\n    const ids = ['profilo', 'perche', 'audience', 'formati', 'brand', 'contatti'];\n    const links = {};\n    root.querySelectorAll('[data-nav-link]').forEach(l => links[l.getAttribute('data-nav-link')] = l);\n    const onScroll = () => {\n      const y = window.scrollY + 130;\n      let cur = ids[0];\n      ids.forEach(id => { const s = document.getElementById(id); if (s && s.offsetTop <= y) cur = id; });\n      Object.keys(links).forEach(k => { links[k].style.color = (k === cur) ? accent : 'rgba(0,24,69,.55)'; });\n    };\n    window.addEventListener('scroll', onScroll, { passive: true });\n    onScroll();\n  }\n\n  renderVals() {\n    // dati live dal Google Sheet (se assenti -> {}), usati come override sui valori hardcoded\n    const sd = this.state.sheet || {};\n    // ogni metrica: chiave foglio, valore di default (numerico), modalita' di formato, suffisso, etichetta, delta\n    const stat = (key, defNum, mode, suffix, l, d) => {\n      const val = this.toNumber(sd[key], defNum);\n      const f = this.formatMetric(val, mode, suffix);\n      return { v: f.display, c: f.c, dec: f.dec, suffix: f.suffix, l, d };\n    };\n    const stats = [\n      stat('views_28gg', 1220000, 'M', '', 'Visualizzazioni', '+107,6%'),\n      stat('nuovi_iscritti_28gg', 9973, 'int', '', 'Nuovi iscritti', '+34,1%'),\n      stat('impressioni_28gg', 9110000, 'M', '', 'Impressioni', '+12,3%'),\n      stat('watch_time_ore_28gg', 56783, 'int', 'h', 'Ore di watch time', '+9,8%'),\n    ];\n    const heroCount = this.formatMetric(this.toNumber(sd.iscritti_totali, 106000), 'int', '+').display;\n\n    const pillars = [\n      { k: '01', t: 'Intelligenza Artificiale', d: 'Tool, agenti e workflow pratici.' },\n      { k: '02', t: 'Finanza Personale', d: 'Investimenti, risparmio, ETF.' },\n      { k: '03', t: 'Produttività', d: 'Sistemi, automazioni, soft skill.' },\n    ];\n\n    const reasons = [\n      { n: '01', tag: 'CRESCITA', t: 'Canale in forte crescita', d: '106.000+ iscritti totali, nuovi iscritti +34,1% e visualizzazioni più che raddoppiate (+107,6%) negli ultimi 28 giorni. Brand come Freedom24 e Bitget hanno già scelto questo canale per posizionarsi sulla nicchia.' },\n      { n: '02', tag: 'AUDIENCE', t: 'Audience altamente targetizzata', d: 'Il pubblico è composto da professionisti che comprano tool, corsi e servizi. CTR medio del 4,25% su oltre 9M di impression.' },\n      { n: '03', tag: 'INTEGRAZIONE', t: 'Integrazione autentica', d: 'Niente spot pubblicitari: il prodotto si integra nel contenuto in modo narrativo, testato e credibile, con tassi di retention sopra la media.' },\n    ];\n\n    const collabResults = [\n      { cat: 'Broker di investimenti online', fmt: 'Integrazione YouTube', ctr: '2,8%', clicks: '2.180', period: '7 GIORNI' },\n      { cat: 'Exchange crypto', fmt: 'Integrazione YouTube', ctr: '3,1%', clicks: '1.650', period: '7 GIORNI' },\n    ];\n\n    const ytThumb = (id) => 'ht
